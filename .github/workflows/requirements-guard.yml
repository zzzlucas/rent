name: Requirements Guard

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'docs/requirements/**'
      - 'docs/agent-rules/**'
      - 'scripts/requirements-guard.cjs'
      - 'package.json'
  push:
    branches:
      - main
      - master
    paths:
      - 'AGENTS.md'
      - 'docs/requirements/**'
      - 'docs/agent-rules/**'
      - 'scripts/requirements-guard.cjs'
      - 'package.json'

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run requirements guard
        run: node scripts/requirements-guard.cjs --ci
